<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0c11" />
    <title>Live Captions</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="join">
    <header class="site-header">
      <a class="brand" href="/" aria-label="Live Captions home">
        <svg class="brand-icon" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="16" cy="16" r="4.5" fill="currentColor"/>
          <circle cx="16" cy="16" r="9" fill="none" stroke="currentColor" stroke-width="1.6" opacity="0.65"/>
          <circle cx="16" cy="16" r="13.2" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.35"/>
        </svg>
        <span class="brand-name">Live Captions</span>
      </a>
      <span id="status" class="status-badge" aria-live="polite">
        <span class="status-dot"></span>
        <span id="status-text" class="status-text">Connecting…</span>
      </span>
    </header>

    <main>
      <section class="join-header">
        <h1 id="room-title">Joining…</h1>
        <div class="join-controls">
          <div class="lang-toggle" role="tablist" aria-label="Caption language">
            <button type="button" class="lang-btn" data-lang="en" role="tab" aria-selected="true">English</button>
            <button type="button" class="lang-btn" data-lang="es" role="tab" aria-selected="false">Español</button>
          </div>
        </div>
      </section>

      <section class="captions" id="captions" aria-live="polite">
        <div id="finals" class="finals"></div>
        <div id="interim" class="interim"></div>
        <p id="captions-empty" class="captions-empty">Waiting for the host to start speaking…</p>
      </section>

      <p id="err" class="err" hidden></p>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/join.js"></script>
  </body>
</html>
